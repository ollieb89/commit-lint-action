name: 'Commit Lint Action'
description: 'Enforce Conventional Commit message format on PRs, pushes, and custom ranges'
author: 'Trivexi AI'
branding:
  icon: check-circle
  color: green

inputs:
  mode:
    description: 'Validation mode: pr, push, sha, or range'
    required: false
    default: 'pr'
  types:
    description: 'Comma-separated list of allowed commit types'
    required: false
    default: 'feat,fix,docs,style,refactor,perf,test,build,ci,chore,revert'
  requireScope:
    description: 'Require a scope in the commit message'
    required: false
    default: 'false'
  allowBreaking:
    description: 'Allow breaking change marker (!)'
    required: false
    default: 'true'
  minSubjectLength:
    description: 'Minimum subject length'
    required: false
    default: '3'
  maxSubjectLength:
    description: 'Maximum subject length'
    required: false
    default: '72'
  githubToken:
    description: 'GitHub token for API access (PR mode)'
    required: false
    default: ${{ github.token }}
  sha:
    description: 'Specific commit SHA to validate (sha mode)'
    required: false
    default: ''
  range:
    description: 'Git range to validate (range mode, e.g. HEAD~3..HEAD)'
    required: false
    default: ''

runs:
  using: 'node20'
  main: 'src/index.js'
