name: Commit Lint
description: Validate commit messages against Conventional Commits format
branding:
  icon: check-circle
  color: green

inputs:
  token:
    description: GitHub token (defaults to GITHUB_TOKEN)
    required: false
    default: ""
  types:
    description: Comma-separated list of allowed commit types
    required: false
    default: feat,fix,docs,style,refactor,perf,test,chore
  scopes:
    description: Optional comma-separated list of allowed scopes (empty = any)
    required: false
    default: ""
  allow-merge-commits:
    description: Allow merge commit messages
    required: false
    default: "false"
  allow-revert:
    description: Allow revert commit messages
    required: false
    default: "true"

runs:
  using: node22
  main: dist/index.js
